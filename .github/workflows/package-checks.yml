name: Package Checks

on:
  push:
  pull_request:

permissions:
  actions: read
  contents: read
  issues: read

jobs:
  package-checks:
    name: Source-Wire package checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run publish readiness
        env:
          GH_TOKEN: ${{ github.token }}
        run: npm run publish:readiness
