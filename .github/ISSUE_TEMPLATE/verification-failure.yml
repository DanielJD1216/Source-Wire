name: Verification failure
description: Report a failing Source-Wire command or readiness marker.
title: "[verification] "
labels:
  - verification
  - reviewer-feedback
body:
  - type: markdown
    attributes:
      value: |
        Use this when a documented Source-Wire command fails.

        Do not paste secrets, tokens, local private paths, real source payloads, account IDs, client names, private screenshots, production exports, or personal data.
  - type: input
    id: command
    attributes:
      label: Command
      description: Paste the exact command that failed.
      placeholder: npm run publish:readiness
    validations:
      required: true
  - type: textarea
    id: observed-error
    attributes:
      label: Observed error
      description: Paste the shortest useful error output. Redact private paths and secrets.
      placeholder: The first failing marker or stack frame.
    validations:
      required: true
  - type: input
    id: node-version
    attributes:
      label: Node.js version
      placeholder: v22.x.x
    validations:
      required: true
  - type: input
    id: npm-version
    attributes:
      label: npm version
      placeholder: 10.x.x
    validations:
      required: true
  - type: dropdown
    id: install-state
    attributes:
      label: Dependency install state
      options:
        - Fresh npm install
        - Existing node_modules
        - Unsure
    validations:
      required: true
  - type: textarea
    id: marker
    attributes:
      label: First missing or failing marker
      description: Use the Publish Readiness marker map when possible.
      placeholder: ok release gate was missing, or docs links failed.
    validations:
      required: false
  - type: checkboxes
    id: boundary-check
    attributes:
      label: Safety check
      options:
        - label: I did not include secrets, private data, local private paths, production exports, account IDs, client names, or real source payloads.
          required: true
