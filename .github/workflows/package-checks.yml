name: Package Checks

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  package-checks:
    name: Source-Wire package checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run CI checks
        run: npm run ci:check
