<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="600" viewBox="0 0 1440 600" role="img" aria-labelledby="title desc">
  <title id="title">Source-Wire trusted memory lifecycle</title>
  <desc id="desc">Evidence becomes a pending candidate, then waits for owner review. Approved candidates become active trusted memory. Corrections create a new revision and supersede the prior revision. Revoked memories are excluded from active reads. Rejected candidates never become trusted memory.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#091321"/>
      <stop offset="1" stop-color="#0c1727"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="16" flood-color="#000814" flood-opacity="0.34"/>
    </filter>
    <marker id="orangeArrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0 0 10 5 0 10z" fill="#ff8a4c"/>
    </marker>
    <marker id="yellowArrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0 0 10 5 0 10z" fill="#f4c15d"/>
    </marker>
    <marker id="greenArrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0 0 10 5 0 10z" fill="#44d19d"/>
    </marker>
    <marker id="redArrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0 0 10 5 0 10z" fill="#ff6b6b"/>
    </marker>
    <style>
      .sans { font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .mono { font-family: "SFMono-Regular", Consolas, "Liberation Mono", monospace; }
      .title { fill: #f8fafc; font-size: 34px; font-weight: 760; }
      .subtitle { fill: #99acc0; font-size: 19px; }
      .step { fill: #f8fafc; font-size: 21px; font-weight: 720; }
      .body { fill: #9fb0c3; font-size: 15px; }
      .tag { font-size: 13px; font-weight: 700; letter-spacing: 1.5px; }
    </style>
  </defs>
  <rect width="1440" height="600" rx="28" fill="url(#bg)"/>
  <g class="sans">
    <text x="64" y="70" class="title">Trust is a lifecycle, not a search result.</text>
    <text x="64" y="104" class="subtitle">Agents may propose and retrieve. Owners control approval, correction, and revocation.</text>

    <g filter="url(#shadow)">
      <rect x="64" y="164" width="252" height="148" rx="20" fill="#151f31" stroke="#ff8a4c"/>
      <rect x="370" y="164" width="252" height="148" rx="20" fill="#171f30" stroke="#f4c15d"/>
      <rect x="676" y="164" width="252" height="148" rx="20" fill="#201f2b" stroke="#f4c15d"/>
      <rect x="982" y="164" width="394" height="148" rx="20" fill="#122b2a" stroke="#44d19d" stroke-width="1.5"/>
    </g>

    <g>
      <text x="88" y="198" class="mono tag" fill="#ff9d6b">01  EVIDENCE</text>
      <text x="88" y="238" class="step">Source-backed</text>
      <text x="88" y="265" class="body">bounded, cited, authorized</text>
      <text x="88" y="289" class="body">never trusted by default</text>

      <text x="394" y="198" class="mono tag" fill="#f7d985">02  PROPOSE</text>
      <text x="394" y="238" class="step">Pending candidate</text>
      <text x="394" y="265" class="body">provenance preserved</text>
      <text x="394" y="289" class="body">no active-memory reads</text>

      <text x="700" y="198" class="mono tag" fill="#f7d985">03  OWNER GATE</text>
      <text x="700" y="238" class="step">Approve or reject</text>
      <text x="700" y="265" class="body">explicit owner control</text>
      <text x="700" y="289" class="body">durable audit record</text>

      <text x="1006" y="198" class="mono tag" fill="#7be0ba">04  TRUSTED MEMORY</text>
      <text x="1006" y="238" class="step">Active revision</text>
      <text x="1006" y="265" class="body">available to authorized agents</text>
      <text x="1006" y="289" class="body">versioned, cited, auditable</text>

      <path d="M316 238H358" stroke="#ff8a4c" stroke-width="3" marker-end="url(#orangeArrow)"/>
      <path d="M622 238H664" stroke="#f4c15d" stroke-width="3" marker-end="url(#yellowArrow)"/>
      <path d="M928 238H970" stroke="#44d19d" stroke-width="3" marker-end="url(#greenArrow)"/>
    </g>

    <g>
      <rect x="676" y="380" width="252" height="92" rx="18" fill="#281b24" stroke="#ff6b6b"/>
      <text x="700" y="414" class="mono tag" fill="#ff9292">REJECTED</text>
      <text x="700" y="447" class="body" font-size="16">never enters trusted memory</text>
      <path d="M802 312V368" stroke="#ff6b6b" stroke-width="2.5" marker-end="url(#redArrow)"/>
      <text x="818" y="345" class="mono" fill="#ff9292" font-size="12">REJECT</text>

      <rect x="982" y="380" width="184" height="92" rx="18" fill="#132923" stroke="#44d19d"/>
      <text x="1006" y="414" class="mono tag" fill="#7be0ba">CORRECT</text>
      <text x="1006" y="447" class="body">new active revision</text>
      <path d="M1074 312V368" stroke="#44d19d" stroke-width="2.5" marker-end="url(#greenArrow)"/>

      <rect x="1192" y="380" width="184" height="92" rx="18" fill="#281b24" stroke="#ff6b6b"/>
      <text x="1216" y="414" class="mono tag" fill="#ff9292">REVOKE</text>
      <text x="1216" y="447" class="body">excluded from reads</text>
      <path d="M1284 312V368" stroke="#ff6b6b" stroke-width="2.5" marker-end="url(#redArrow)"/>
    </g>

    <g transform="translate(64 520)">
      <rect width="1312" height="42" rx="21" fill="#132136" stroke="#354b67"/>
      <text x="656" y="27" text-anchor="middle" fill="#dbe8f6" font-size="16" font-weight="650">Source evidence ≠ pending candidate ≠ trusted memory. Every transition preserves provenance and audit history.</text>
    </g>
  </g>
</svg>
