<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="680" viewBox="0 0 1440 680" role="img" aria-labelledby="title desc">
  <title id="title">Knowledge base and Source-Wire memory comparison</title>
  <desc id="desc">A knowledge base retrieves current source evidence. Source-Wire governs durable memories, their provenance, approval, revisions, corrections, revocation, and audit history. Evidence may support a pending candidate but cannot approve itself.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#091321"/>
      <stop offset="1" stop-color="#0d1829"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="14" stdDeviation="18" flood-color="#000814" flood-opacity="0.34"/>
    </filter>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0 0 10 5 0 10z" fill="#f4c15d"/>
    </marker>
    <style>
      .sans { font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .mono { font-family: "SFMono-Regular", Consolas, "Liberation Mono", monospace; }
      .title { fill: #f8fafc; font-size: 34px; font-weight: 760; }
      .subtitle { fill: #99acc0; font-size: 19px; }
      .eyebrow { font-size: 15px; font-weight: 700; letter-spacing: 2.2px; }
      .rowTitle { fill: #edf4fb; font-size: 20px; font-weight: 700; }
      .rowText { fill: #9fb0c3; font-size: 16px; }
    </style>
  </defs>
  <rect width="1440" height="680" rx="28" fill="url(#bg)"/>
  <g class="sans">
    <text x="64" y="74" class="title">Knowledge finds. Memory governs.</text>
    <text x="64" y="108" class="subtitle">Source-Wire does not replace your knowledge base. It controls what becomes durable agent memory.</text>

    <g filter="url(#shadow)">
      <rect x="64" y="150" width="542" height="418" rx="22" fill="#111d2f" stroke="#75472f"/>
      <rect x="834" y="150" width="542" height="418" rx="22" fill="#111d2f" stroke="#2e7b65"/>
    </g>

    <text x="96" y="194" class="mono eyebrow" fill="#ff9d6b">KNOWLEDGE BASE</text>
    <text x="96" y="235" class="title" font-size="28">What can I find now?</text>
    <line x1="96" y1="259" x2="574" y2="259" stroke="#2c3a4f"/>

    <g>
      <circle cx="110" cy="298" r="7" fill="#ff8a4c"/>
      <text x="132" y="304" class="rowTitle">Corpus</text>
      <text x="132" y="329" class="rowText">documents, chats, code, databases</text>

      <circle cx="110" cy="370" r="7" fill="#ff8a4c"/>
      <text x="132" y="376" class="rowTitle">Primary job</text>
      <text x="132" y="401" class="rowText">retrieve current source evidence</text>

      <circle cx="110" cy="442" r="7" fill="#ff8a4c"/>
      <text x="132" y="448" class="rowTitle">Source-Wire posture</text>
      <text x="132" y="473" class="rowText">optional, read-only, replaceable</text>

      <rect x="96" y="505" width="478" height="38" rx="19" fill="#251d21" stroke="#75472f"/>
      <text x="335" y="530" text-anchor="middle" class="mono" fill="#ffb28a" font-size="14">EVIDENCE IS NOT TRUSTED MEMORY</text>
    </g>

    <text x="866" y="194" class="mono eyebrow" fill="#62dcae">SOURCE-WIRE MEMORY</text>
    <text x="866" y="235" class="title" font-size="28">What should agents remember?</text>
    <line x1="866" y1="259" x2="1344" y2="259" stroke="#2c3a4f"/>

    <g>
      <circle cx="880" cy="298" r="7" fill="#44d19d"/>
      <text x="902" y="304" class="rowTitle">State</text>
      <text x="902" y="329" class="rowText">candidates, approved memories, revisions</text>

      <circle cx="880" cy="370" r="7" fill="#44d19d"/>
      <text x="902" y="376" class="rowTitle">Primary job</text>
      <text x="902" y="401" class="rowText">preserve durable, governed context</text>

      <circle cx="880" cy="442" r="7" fill="#44d19d"/>
      <text x="902" y="448" class="rowTitle">Control</text>
      <text x="902" y="473" class="rowText">owner approval, correction, revocation, audit</text>

      <rect x="866" y="505" width="478" height="38" rx="19" fill="#132923" stroke="#2e7b65"/>
      <text x="1105" y="530" text-anchor="middle" class="mono" fill="#7be0ba" font-size="14">OWNER-CONTROLLED DURABLE CONTEXT</text>
    </g>

    <g>
      <path d="M620 335H820" stroke="#f4c15d" stroke-width="3" marker-end="url(#arrow)"/>
      <rect x="630" y="274" width="194" height="102" rx="18" fill="#201f2b" stroke="#f4c15d"/>
      <text x="727" y="304" text-anchor="middle" class="mono" fill="#f7d985" font-size="13">SAFE BRIDGE</text>
      <text x="727" y="333" text-anchor="middle" fill="#f8fafc" font-size="18" font-weight="700">Pending candidate</text>
      <text x="727" y="357" text-anchor="middle" fill="#a9b8c8" font-size="14">owner decides</text>
      <path d="M630 431H824" stroke="#4b596b" stroke-width="2" stroke-dasharray="8 8"/>
      <text x="727" y="421" text-anchor="middle" class="mono" fill="#8fa1b5" font-size="12">NO AUTO-PROMOTION</text>
    </g>

    <g transform="translate(64 606)">
      <rect width="1312" height="42" rx="21" fill="#132136" stroke="#354b67"/>
      <circle cx="27" cy="21" r="7" fill="#4fa3ff"/>
      <text x="48" y="27" fill="#dbe8f6" font-size="16" font-weight="650">Compatible, not coupled:</text>
      <text x="250" y="27" fill="#9fb0c3" font-size="16">bring your own knowledge system, PostgreSQL, and agent harness while Source-Wire preserves the trust boundary.</text>
    </g>
  </g>
</svg>
