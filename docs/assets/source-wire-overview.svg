<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="720" viewBox="0 0 1600 720" role="img" aria-labelledby="title desc">
  <title id="title">Source-Wire system overview</title>
  <desc id="desc">Owner-selected sources and an optional knowledge base provide evidence to Source-Wire. Source-Wire applies policy, creates pending candidates, requires owner approval, stores trusted memory in adopter-owned PostgreSQL, and serves authorized AI agents through MCP.</desc>
  <defs>
    <linearGradient id="background" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#08111f"/>
      <stop offset="0.55" stop-color="#0d1728"/>
      <stop offset="1" stop-color="#07101c"/>
    </linearGradient>
    <linearGradient id="wire" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#ff8a4c"/>
      <stop offset="0.5" stop-color="#f4c15d"/>
      <stop offset="1" stop-color="#4fa3ff"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="20" flood-color="#000814" flood-opacity="0.38"/>
    </filter>
    <marker id="arrowOrange" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0 0 10 5 0 10z" fill="#ff8a4c"/>
    </marker>
    <marker id="arrowBlue" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0 0 10 5 0 10z" fill="#4fa3ff"/>
    </marker>
    <style>
      .sans { font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .mono { font-family: "SFMono-Regular", Consolas, "Liberation Mono", monospace; }
      .label { fill: #91a4ba; font-size: 17px; font-weight: 650; letter-spacing: 2.6px; }
      .nodeTitle { fill: #f7fafc; font-size: 24px; font-weight: 700; }
      .nodeText { fill: #a9b9ca; font-size: 17px; }
      .tiny { fill: #91a4ba; font-size: 15px; }
      .pill { fill: #dbe8f6; font-size: 15px; font-weight: 650; }
    </style>
  </defs>

  <rect width="1600" height="720" rx="28" fill="url(#background)"/>
  <path d="M50 83H1550" stroke="#223149" stroke-width="1"/>
  <g class="sans">
    <g transform="translate(64 43)">
      <circle cx="15" cy="15" r="14" fill="#14243b" stroke="#4fa3ff" stroke-width="2"/>
      <path d="M9 15h12M15 9v12" stroke="#f4c15d" stroke-width="2.2" stroke-linecap="round"/>
      <text x="42" y="22" fill="#f7fafc" font-size="24" font-weight="760" letter-spacing="0.5">SOURCE-WIRE</text>
    </g>
    <text x="1536" y="65" text-anchor="end" class="mono tiny">GOVERNED AGENT MEMORY</text>

    <text x="64" y="142" fill="#f7fafc" font-size="42" font-weight="760">Evidence in. Owner-approved memory out.</text>
    <text x="64" y="178" fill="#9fb0c3" font-size="20">A replaceable boundary between what agents can find and what they are allowed to remember.</text>

    <g filter="url(#shadow)">
      <rect x="64" y="226" width="364" height="348" rx="22" fill="#101b2c" stroke="#33445b"/>
      <rect x="460" y="226" width="680" height="348" rx="22" fill="#0f1b2e" stroke="#3a6e9e" stroke-width="1.5"/>
      <rect x="1172" y="226" width="364" height="348" rx="22" fill="#101b2c" stroke="#33445b"/>
    </g>

    <text x="92" y="264" class="label">OWNER-SELECTED INPUTS</text>
    <g>
      <rect x="92" y="290" width="308" height="56" rx="12" fill="#172338" stroke="#7d4b33"/>
      <circle cx="120" cy="318" r="8" fill="#ff8a4c"/>
      <text x="142" y="325" class="nodeTitle" font-size="19">Documents and wikis</text>

      <rect x="92" y="358" width="308" height="56" rx="12" fill="#172338" stroke="#7d4b33"/>
      <circle cx="120" cy="386" r="8" fill="#ff8a4c"/>
      <text x="142" y="393" class="nodeTitle" font-size="19">Chats, code, systems</text>

      <rect x="92" y="426" width="308" height="76" rx="12" fill="#172338" stroke="#7d4b33"/>
      <circle cx="120" cy="455" r="8" fill="#ff8a4c"/>
      <text x="142" y="460" class="nodeTitle" font-size="19">Your knowledge base</text>
      <text x="142" y="483" class="nodeText" font-size="15">optional, read-only, replaceable</text>
    </g>
    <text x="92" y="544" class="tiny">These remain evidence, not truth.</text>

    <text x="490" y="264" class="label">SOURCE-WIRE POLICY BOUNDARY</text>
    <g>
      <rect x="490" y="290" width="186" height="102" rx="16" fill="#182437" stroke="#ff8a4c"/>
      <text x="512" y="323" class="mono" fill="#ffb28a" font-size="14">01  EVIDENCE</text>
      <text x="512" y="354" class="nodeTitle" font-size="20">Validate scope</text>
      <text x="512" y="377" class="nodeText" font-size="14">ACL + provenance</text>

      <rect x="708" y="290" width="186" height="102" rx="16" fill="#182437" stroke="#f4c15d"/>
      <text x="730" y="323" class="mono" fill="#f7d985" font-size="14">02  CANDIDATE</text>
      <text x="730" y="354" class="nodeTitle" font-size="20">Propose</text>
      <text x="730" y="377" class="nodeText" font-size="14">pending only</text>

      <rect x="926" y="290" width="184" height="102" rx="16" fill="#201f2b" stroke="#f4c15d"/>
      <text x="948" y="323" class="mono" fill="#f7d985" font-size="14">03  OWNER GATE</text>
      <text x="948" y="354" class="nodeTitle" font-size="20">Approve</text>
      <text x="948" y="377" class="nodeText" font-size="14">or reject</text>

      <path d="M676 341H699" stroke="#ff8a4c" stroke-width="3" marker-end="url(#arrowOrange)"/>
      <path d="M894 341H917" stroke="#f4c15d" stroke-width="3" marker-end="url(#arrowOrange)"/>

      <rect x="490" y="424" width="620" height="112" rx="18" fill="#122b2a" stroke="#44d19d" stroke-width="1.5"/>
      <circle cx="526" cy="460" r="13" fill="#44d19d"/>
      <path d="m520 460 5 5 9-11" fill="none" stroke="#071a17" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
      <text x="554" y="463" class="nodeTitle">Trusted memory</text>
      <text x="554" y="489" class="nodeText">active revisions, citations, corrections, revocation, audit</text>
      <text x="554" y="515" class="mono" fill="#76ddb6" font-size="14">ADOPTER-OWNED POSTGRESQL</text>
      <path d="M1018 392V415" stroke="#f4c15d" stroke-width="3" marker-end="url(#arrowOrange)"/>
    </g>

    <text x="1200" y="264" class="label">AUTHORIZED AGENT ACCESS</text>
    <g>
      <rect x="1200" y="290" width="308" height="76" rx="14" fill="#14243a" stroke="#4fa3ff"/>
      <text x="1226" y="322" class="mono" fill="#86c3ff" font-size="14">API POLICY</text>
      <text x="1226" y="349" class="nodeTitle" font-size="19">Identity + namespace</text>

      <rect x="1200" y="382" width="308" height="76" rx="14" fill="#14243a" stroke="#4fa3ff"/>
      <text x="1226" y="414" class="mono" fill="#86c3ff" font-size="14">MCP</text>
      <text x="1226" y="441" class="nodeTitle" font-size="19">Policy-routed tools</text>

      <rect x="1200" y="474" width="308" height="62" rx="14" fill="#14243a" stroke="#4fa3ff"/>
      <circle cx="1232" cy="505" r="10" fill="#4fa3ff"/>
      <text x="1255" y="513" class="nodeTitle" font-size="19">AI agents</text>
    </g>

    <path d="M428 401H451" stroke="#ff8a4c" stroke-width="3" marker-end="url(#arrowOrange)"/>
    <path d="M1140 401H1163" stroke="#4fa3ff" stroke-width="3" marker-end="url(#arrowBlue)"/>

    <g transform="translate(64 618)">
      <rect width="338" height="44" rx="22" fill="#132136" stroke="#35506e"/>
      <circle cx="24" cy="22" r="6" fill="#ff8a4c"/>
      <text x="42" y="28" class="pill">Knowledge provider is optional</text>
      <rect x="420" width="350" height="44" rx="22" fill="#132136" stroke="#35506e"/>
      <circle cx="444" cy="22" r="6" fill="#44d19d"/>
      <text x="462" y="28" class="pill">Memory remains owner-controlled</text>
      <rect x="788" width="314" height="44" rx="22" fill="#132136" stroke="#35506e"/>
      <circle cx="812" cy="22" r="6" fill="#4fa3ff"/>
      <text x="830" y="28" class="pill">Infrastructure is replaceable</text>
      <rect x="1120" width="416" height="44" rx="22" fill="#251b22" stroke="#75404b"/>
      <circle cx="1144" cy="22" r="6" fill="#ff6b6b"/>
      <text x="1162" y="28" class="pill">Automatic trusted-memory promotion is forbidden</text>
    </g>
  </g>
</svg>
